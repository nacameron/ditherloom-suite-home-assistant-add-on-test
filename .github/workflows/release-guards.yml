name: Release Guards

on:
  push:
  pull_request:

jobs:
  release-guards:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_release_guards.py
        env:
          GH_TOKEN: ${{ github.token }}
